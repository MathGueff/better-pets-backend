name: testai-app
region: nyc

services:
  - name: backend
    source_dir: backend

    build_command: yarn install && yarn build
    run_command: yarn start

    http_port: 3001

    instance_count: 1
    instance_size_slug: basic-xxs

    envs:
      - key: PORT
        scope: RUN_TIME
        value: "3001"

      - key: MONGODB_URI
        scope: RUN_TIME
        type: SECRET

    routes:
      - path: /api

static_sites:
  - name: frontend
    source_dir: frontend

    build_command: yarn install && yarn build
    output_dir: dist

    routes:
      - path: /