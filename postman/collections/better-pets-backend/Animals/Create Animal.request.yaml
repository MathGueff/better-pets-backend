$kind: http-request
name: Create Animal
method: POST
url: '{{baseUrl}}/animals'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Rex",
      "breed": "Labrador",
      "gender": "M",
      "size": 60,
      "weight": 30,
      "bornDate": "2020-01-15",
      "adoptionDate": "2021-06-10",
      "photo": "https://example.com/rex.jpg",
      "schedule": {
        "walk": { "timeExpected": "2024-01-01T07:00:00.000Z" },
        "feed": { "timeExpected": "2024-01-01T08:00:00.000Z" },
        "water": { "timeExpected": "2024-01-01T09:00:00.000Z" }
      }
    }
